<!DOCTYPE html>
<html>
<head>
<title>AI Prompt Generator</title>
<style>
body{
font-family: Arial;
text-align:center;
background:#0f172a;
color:white;
padding:40px;
}

input{
padding:10px;
width:300px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
margin-left:10px;
background:#22c55e;
border:none;
color:white;
cursor:pointer;
}

#result{
margin-top:30px;
font-size:18px;
background:#1e293b;
padding:20px;
border-radius:10px;
}
</style>
</head>

<body>

<h1>AI Prompt Generator</h1>
<p>Enter a topic and generate a prompt</p>

<input id="topic" placeholder="Example: Space Travel">
<button onclick="generate()">Generate</button>

<div id="result"></div>

<script>
function generate(){

let topic=document.getElementById("topic").value;

let prompt="Write a detailed and creative article about "+topic+" including interesting facts and future possibilities.";

document.getElementById("result").innerText=prompt;

}
</script>

</body>
</html>
