<!DOCTYPE html>
<html>
<head>
<title>AI Prompt Generator</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
padding:40px;
}

textarea{
width:80%;
height:120px;
padding:10px;
}

button{
padding:10px 20px;
margin-top:10px;
background:#333;
color:white;
border:none;
cursor:pointer;
}

#result{
margin-top:20px;
padding:20px;
background:white;
width:80%;
margin-left:auto;
margin-right:auto;
}

.ad{
margin-top:30px;
background:#ddd;
padding:20px;
}
</style>
</head>

<body>

<h1>AI Prompt Tool</h1>

<p>Enter your prompt and generate AI content</p>

<textarea id="prompt" placeholder="Ask something..."></textarea>

<br>

<button onclick="generate()">Generate</button>

<div id="result"></div>

<div class="ad">
<!-- Google AdSense Ad -->
Ad Space
</div>

<script>

async function generate(){

let prompt=document.getElementById("prompt").value;

let response=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer YOUR_OPENAI_API_KEY"
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"user",content:prompt}
]
})
});

let data=await response.json();

document.getElementById("result").innerText=
data.choices[0].message.content;

}

</script>

</body>
</html>
